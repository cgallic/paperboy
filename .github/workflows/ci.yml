name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with all extras
        run: pip install -e ".[all]"
      - name: Validate installed dependency graph
        run: python -m pip check
      - name: Compile package
        run: python -m compileall -q paperboy
      - name: Run tests
        run: python -m pytest tests/ -v
      - name: Preserve current action-queue smoke
        run: python -m paperboy.digest.action_queue --dry-run > /tmp/action-queue.json
      - name: Render local Daily Intelligence Brief sample
        run: python -m paperboy.daily_brief.cli --input examples/daily-brief.sample.json --out-dir /tmp/paperboy-daily-brief
      - name: API health smoke test
        run: |
          python -m uvicorn paperboy.api.main:app --host 127.0.0.1 --port 8000 &
          sleep 2
          curl -fsS http://127.0.0.1:8000/api/health | grep -q status
          kill %1
      - name: Lint with ruff
        run: ruff check .
      - name: Type-check package
        run: mypy paperboy

  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime dependencies and audit tool
        run: pip install -e ".[api,email]" pip-audit
      - name: Audit resolved Python dependencies
        run: python -m pip_audit --skip-editable
