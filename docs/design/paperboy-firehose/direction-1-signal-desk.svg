<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Paperboy direction one: Signal Desk</title>
  <desc id="desc">An editorial landing page where many sources pass through a relevance gate into a short ranked brief.</desc>
  <rect width="1280" height="800" fill="#f3eee3"/>
  <rect width="1280" height="42" fill="#11161c"/>
  <text x="54" y="28" fill="#f7f3ea" font-family="Arial" font-size="13" font-weight="700">PAPERBOY / FREE FILTERED SAMPLE</text>
  <text x="54" y="100" fill="#15171a" font-family="Georgia" font-size="26" font-weight="700">paperboy</text>
  <line x1="54" y1="122" x2="1226" y2="122" stroke="#aaa08f"/>
  <text x="54" y="197" fill="#17489f" font-family="monospace" font-size="14" font-weight="700">YOUR OWN FILTERED FIREHOSE</text>
  <text x="54" y="266" fill="#15171a" font-family="Georgia" font-size="60" font-weight="700">Build your firehose.</text>
  <text x="54" y="330" fill="#15171a" font-family="Georgia" font-size="60" font-weight="700">Read only what matters.</text>
  <text x="54" y="382" fill="#555c63" font-family="Arial" font-size="19">Choose the sources. Define relevance. Get one source-linked brief.</text>
  <rect x="54" y="426" width="238" height="56" rx="4" fill="#2864dc"/>
  <text x="83" y="461" fill="white" font-family="Arial" font-size="16" font-weight="700">BUILD MY FREE SAMPLE →</text>
  <g font-family="monospace" font-size="12" font-weight="700">
    <rect x="720" y="176" width="170" height="48" rx="4" fill="#fbf8f1" stroke="#aaa08f"/><text x="743" y="205" fill="#15171a">HACKER NEWS</text>
    <rect x="720" y="241" width="170" height="48" rx="4" fill="#fbf8f1" stroke="#aaa08f"/><text x="743" y="270" fill="#15171a">STARTUP RSS</text>
    <rect x="720" y="306" width="170" height="48" rx="4" fill="#fbf8f1" stroke="#aaa08f"/><text x="743" y="335" fill="#15171a">ARXIV / RESEARCH</text>
    <rect x="720" y="371" width="170" height="48" rx="4" fill="#fbf8f1" stroke="#aaa08f"/><text x="743" y="400" fill="#15171a">PUBLIC REPOS</text>
  </g>
  <path d="M900 200 C960 200 945 310 1002 310 M900 265 C960 265 945 310 1002 310 M900 330 C960 330 945 310 1002 310 M900 395 C960 395 945 310 1002 310" fill="none" stroke="#2864dc" stroke-width="2"/>
  <rect x="1002" y="250" width="92" height="120" rx="8" fill="#17489f"/>
  <text x="1048" y="293" text-anchor="middle" fill="white" font-family="monospace" font-size="11">YOUR</text><text x="1048" y="314" text-anchor="middle" fill="white" font-family="monospace" font-size="11">FOCUS</text><text x="1048" y="342" text-anchor="middle" fill="#9ec0ff" font-family="monospace" font-size="18">›</text>
