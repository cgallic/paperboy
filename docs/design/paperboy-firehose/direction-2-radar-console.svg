  <rect x="848" y="338" width="364" height="122" rx="8" fill="#18242f"/><text x="872" y="367" fill="#f0a84a" font-family="monospace" font-size="11">7.8 / ARXIV</text><text x="872" y="400" fill="#f2f6fa" font-size="18" font-weight="700">Eval method worth testing</text><text x="872" y="428" fill="#9cabb7" font-size="14">Matches current agent work</text>
